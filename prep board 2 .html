<!DOCTYPE html>
<html lang="en">
<head> <link rel="icon" href="favicon.ico" type="image/x-icon">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midday Prep Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap');

  :root {
    --bg: #1a1a18;
    --surface: #242420;
    --card-bg: #2c2c28;
    --card-border: #3a3a34;
    --card-hover: #333330;
    --accent: #e8c84a;
    --accent-dim: #b89c2e;
    --text-primary: #ffffff;
    --text-secondary: #d8d4c8;
    --text-muted: #a0a090;
    --drag-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 2px var(--accent);
    --card-shadow: 0 2px 8px rgba(0,0,0,0.4);
    --sidebar-w: 55vw;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    padding: 8px 20px 7px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    background: var(--surface);
    flex-shrink: 0;
    z-index: 200;
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  header span {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hdr-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    font-family: 'Oswald', sans-serif;
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 5px 13px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .hdr-btn:hover { background: var(--card-hover); border-color: #5a5a50; color: var(--text-primary); }

  .hdr-btn.accent {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .hdr-btn.accent:hover { background: #2e2e1e; border-color: var(--accent); }

  .save-status {
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    transition: color 0.4s;
  }

  .save-status.saved { color: #6abf6a; }

  .main-area {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* BOARD */
  .board-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    transition: margin-right 0.28s cubic-bezier(.4,0,.2,1);
  }

  .board-wrap.sidebar-open {
    margin-right: 55vw;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    padding: 8px;
    align-items: start;
  }

  /* CARDS */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    user-select: none;
    transition: box-shadow 0.15s, background 0.15s, border-color 0.15s, transform 0.1s;
    position: relative;
    min-height: 50px;
    display: flex;
    flex-direction: column;
    resize: vertical;
    overflow: auto;
  }

  .card:hover { background: var(--card-hover); border-color: #4a4a44; }

  .card.active {
    border-color: var(--accent);
    background: #2d2d22;
  }

  .card.active::before { background: var(--accent) !important; }

  .card.dragging {
    cursor: grabbing;
    box-shadow: var(--drag-shadow);
    transform: rotate(1.5deg) scale(1.04);
    z-index: 9999;
  }

  .card.drag-over {
    border-color: var(--accent-dim);
    background: #2e2e24;
  }

  .card::before {
    content: '';
    display: block;
    height: 3px;
    background: var(--card-border);
    border-radius: 4px 4px 0 0;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .card:hover::before { background: var(--accent-dim); }
  .card.dragging::before { background: var(--accent); }

  .card-num {
    position: absolute;
    top: 7px;
    right: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.5rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    pointer-events: none;
  }

  .card-headline-label {
    padding: 4px 20px 3px 7px;
    border-bottom: 1px solid var(--card-border);
    font-family: 'Oswald', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 20px;
    line-height: 1.3;
  }

  .card-headline-label.color-1 { color: #e8c84a; }
  .card-headline-label.color-2 { color: #ffa500; }
  .card-headline-label.color-3 { color: #51cf66; }
  .card-headline-label.color-4 { color: #77a8ff; }

  .card-headline-label.empty { color: var(--text-muted); font-weight: 400; }

  .card-preview {
    flex: 1;
    padding: 4px 7px 5px;
    font-size: 0.55rem;
    font-weight: 300;
    line-height: 1.5;
    color: var(--text-muted);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    pointer-events: none;
    white-space: pre-wrap;
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    top: 0;
    right: 0;
    width: 55vw;
    min-width: 55vw;
    height: 100vh;
    background: #1c1c1a;
    border-left: 1px solid var(--card-border);
    display: flex;
    flex-direction: column;
    z-index: 300;
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: -10px 0 50px rgba(0,0,0,0.55);
  }

  .sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 14px 14px 12px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .sb-card-num {
    font-family: 'Oswald', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .sb-headline {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Oswald', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    caret-color: var(--accent);
  }

  .sb-headline::placeholder { color: var(--text-muted); font-weight: 400; }

  .sb-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }

  .sb-close:hover { color: var(--text-primary); background: var(--card-border); }

  .sb-body-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 14px 16px 10px;
  }

  .sb-textarea {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 0.84rem;
    font-weight: 300;
    line-height: 1.75;
    color: var(--text-secondary);
    caret-color: var(--text-primary);
  }

  .sb-textarea::placeholder { color: var(--text-muted); font-style: italic; }

  .sb-nav {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-secondary);
    font-family: 'Oswald', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .nav-btn:hover { background: var(--card-hover); border-color: #5a5a50; color: var(--text-primary); }

  .nav-label {
    flex: 1;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* Individual card clear button */
  .card-clear {
    position: absolute;
    bottom: 5px;
    right: 6px;
    width: 18px;
    height: 18px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    color: var(--text-muted);
    font-size: 0.55rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
    z-index: 10;
    pointer-events: none;
    line-height: 1;
    padding: 0;
  }

  .card:hover .card-clear.has-content {
    opacity: 1;
    pointer-events: auto;
  }

  .card-clear:hover {
    background: #4a2020;
    border-color: #c06060;
    color: #e88;
  }

  /* Card checkbox for multi-select */
  .card-checkbox {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    background: var(--card-bg);
    border: 1.5px solid var(--text-muted);
    border-radius: 3px;
    cursor: pointer;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .card:hover .card-checkbox,
  .card.selected .card-checkbox,
  .board.select-mode .card-checkbox {
    opacity: 1;
    pointer-events: auto;
  }

  .card-checkbox:hover {
    border-color: var(--accent);
    background: #2e2e1e;
  }

  .card-checkbox::after {
    content: '';
    display: none;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 1.5px;
  }

  .card.selected .card-checkbox {
    border-color: var(--accent);
    background: #2e2e1e;
  }

  .card.selected .card-checkbox::after {
    display: block;
  }

  .card.selected {
    border-color: var(--accent-dim);
    background: #2a2a20;
  }

  .card.selected::before {
    background: var(--accent-dim);
  }

  /* Selection bar in header */
  .select-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-left: 12px;
  }

  .select-bar.visible {
    display: flex;
  }

  .select-count {
    font-family: 'Oswald', sans-serif;
    font-size: 0.66rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--accent);
    white-space: nowrap;
  }

  .hdr-btn.danger {
    border-color: #804040;
    color: #e88;
  }

  .hdr-btn.danger:hover {
    background: #3a2020;
    border-color: #c06060;
    color: #f99;
  }

  .hdr-btn.ghost {
    border-color: transparent;
    color: var(--text-muted);
    background: transparent;
  }

  .hdr-btn.ghost:hover {
    color: var(--text-primary);
    background: var(--card-bg);
  }

  /* Sidebar clear card button */
  .sb-clear-btn {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    font-family: 'Oswald', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    margin-left: auto;
    white-space: nowrap;
  }

  .sb-clear-btn:hover {
    background: #3a2020;
    border-color: #c06060;
    color: #e88;
  }

  @media (max-width: 1200px) {
    .board { grid-template-columns: repeat(4, 1fr); }
    :root { --sidebar-w: 55vw; }
  }
  @media (max-width: 700px) {
    .board { grid-template-columns: repeat(2, 1fr); }
    :root { --sidebar-w: 100vw; }
  }
</style>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="shell">
  <header>
    <h1>Midday Prep Board</h1>
    <span>32 cards · click to open · drag to reorder</span>
    <div class="select-bar" id="selectBar">
      <span class="select-count" id="selectCount">0 selected</span>
      <button class="hdr-btn danger" id="btnClearSelected">Clear Selected</button>
      <button class="hdr-btn ghost" id="btnDeselectAll">Deselect</button>
    </div>
    <div class="header-actions">
      <span class="save-status" id="saveStatus"></span>
      <button class="hdr-btn" id="btnClear" title="Clear all cards">Clear</button>
      <button class="hdr-btn" id="btnLoad" title="Load a saved .json file">Load File</button>
      <input type="file" id="fileInput" accept=".json" style="display:none" />
      <button class="hdr-btn accent" id="btnSave" title="Save to file">&#x2b07; Save</button>
    </div>
  </header>

  <div class="main-area">
    <div class="board-wrap" id="boardWrap">
      <div class="board" id="board"></div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sb-card-num" id="sbNum">#01</span>
        <input class="sb-headline" id="sbHeadline" type="text" placeholder="HEADLINE" spellcheck="false" />
        <button class="sb-close" id="sbClose" title="Close (Esc)">✕</button>
        <button class="sb-clear-btn" id="sbClearCard" title="Clear this card">Clear Card</button>
      </div>
      <div class="sb-body-wrap">
        <textarea class="sb-textarea" id="sbBody" placeholder="Paste your full story prep here…" spellcheck="false"></textarea>
      </div>
      <div class="sb-nav">
        <button class="nav-btn" id="navPrev">← Prev</button>
        <span class="nav-label" id="navLabel">Card 1 of 32</span>
        <button class="nav-btn" id="navNext">Next →</button>
      </div>
    </div>
  </div>
</div>

<script>
  const board      = document.getElementById('board');
  const boardWrap  = document.getElementById('boardWrap');
  const sidebar    = document.getElementById('sidebar');
  const sbNum      = document.getElementById('sbNum');
  const sbHeadline = document.getElementById('sbHeadline');
  const sbBody     = document.getElementById('sbBody');
  const sbClose    = document.getElementById('sbClose');
  const navPrev    = document.getElementById('navPrev');
  const navNext    = document.getElementById('navNext');
  const navLabel   = document.getElementById('navLabel');
  const saveStatus = document.getElementById('saveStatus');
  const btnSave    = document.getElementById('btnSave');
  const btnLoad    = document.getElementById('btnLoad');
  const btnClear   = document.getElementById('btnClear');
  const fileInput  = document.getElementById('fileInput');
  const sbClearCard = document.getElementById('sbClearCard');
  const selectBar = document.getElementById('selectBar');
  const selectCount = document.getElementById('selectCount');
  const btnClearSelected = document.getElementById('btnClearSelected');
  const btnDeselectAll = document.getElementById('btnDeselectAll');

  const N = 32;

  // ── Firebase (graceful fallback if SDK blocked) ──
  let db = null;
  const DB_PATH = 'prep-board/cards';
  let isSyncing = false;

  if (typeof firebase !== 'undefined') {
    const firebaseConfig = {
      apiKey: "AIzaSyD8j5Gn3yLRJO9Y4sRcYr_otX3TtLvA0Bk",
      authDomain: "midday-prep-sheet.firebaseapp.com",
      databaseURL: "https://midday-prep-sheet-default-rtdb.firebaseio.com",
      projectId: "midday-prep-sheet",
      storageBucket: "midday-prep-sheet.firebasestorage.app",
      messagingSenderId: "731020508567",
      appId: "1:731020508567:web:1fc2ae980dc5f8e475d8d2"
    };
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  }

  function saveToFirebase() {
    if (!db) return;
    flushSidebar();
    db.ref(DB_PATH).set(data).then(() => {
      showStatus('SYNCED');
    }).catch(() => showStatus('SYNC FAILED', false));
  }

  function loadFromFirebase() {
    if (!db) return;
    db.ref(DB_PATH).once('value').then(snapshot => {
      const val = snapshot.val();
      if (Array.isArray(val)) {
        loadFromArray(val);
        showStatus('LOADED');
      }
    });
  }

  // Auto-sync to Firebase on edits (debounced)
  let firebaseTimer = null;
  function scheduleFirebaseSync() {
    clearTimeout(firebaseTimer);
    firebaseTimer = setTimeout(saveToFirebase, 1500);
  }

  const STORAGE_KEY = 'midday-prep-board-v1';
  let activeIdx = null;
  let dragSrc   = null;
  let autoSaveTimer = null;

  // Data store
  const data = Array.from({ length: N }, () => ({ headline: '', body: '' }));

  // Build cards
  for (let i = 0; i < N; i++) {
    const card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.dataset.idx = i;
    const col = i % 4;
    const rowInCol = Math.floor(i / 4);
    const colNums = [10, 11, 12, 1];
    const colNum = colNums[col];
    const pairNum = Math.floor(rowInCol / 2) + 1;
    const letter = rowInCol % 2 === 0 ? 'a' : 'b';
    card.innerHTML = `
      <div class="card-checkbox" title="Select this card"></div>
      <button class="card-clear" title="Clear this card">✕</button>
      <span class="card-num">${colNum}-${pairNum}${letter}</span>
      <div class="card-headline-label color-${col + 1} empty">HEADLINE</div>
      <div class="card-preview"></div>
    `;
    board.appendChild(card);
  }

  function getCard(i) { return board.children[i]; }

  function refreshCard(i) {
    const card    = getCard(i);
    const label   = card.querySelector('.card-headline-label');
    const preview = card.querySelector('.card-preview');
    const clearBtn = card.querySelector('.card-clear');
    label.textContent = data[i].headline || 'HEADLINE';
    label.classList.toggle('empty', !data[i].headline);
    preview.textContent = data[i].body;
    const hasContent = !!(data[i].headline || data[i].body);
    clearBtn.classList.toggle('has-content', hasContent);
  }

  function flushSidebar() {
    if (activeIdx === null) return;
    data[activeIdx].headline = sbHeadline.value;
    data[activeIdx].body     = sbBody.value;
    refreshCard(activeIdx);
  }

  function openCard(i) {
    flushSidebar();
    activeIdx = i;
    const col = i % 4;
    const rowInCol = Math.floor(i / 4);
    const colNums = [10, 11, 12, 1];
    const colNum = colNums[col];
    const pairNum = Math.floor(rowInCol / 2) + 1;
    const letter = rowInCol % 2 === 0 ? 'a' : 'b';
    sbNum.textContent    = `${colNum}-${pairNum}${letter}`;
    sbHeadline.value     = data[i].headline;
    sbBody.value         = data[i].body;
    navLabel.textContent = `Card ${i + 1} of ${N}`;
    document.querySelectorAll('.card.active').forEach(c => c.classList.remove('active'));
    getCard(i).classList.add('active');
    sidebar.classList.add('open');
    boardWrap.classList.add('sidebar-open');
    sbBody.focus();
  }

  function closeSidebar() {
    flushSidebar();
    sidebar.classList.remove('open');
    boardWrap.classList.remove('sidebar-open');
    document.querySelectorAll('.card.active').forEach(c => c.classList.remove('active'));
    activeIdx = null;
  }

  sbClose.addEventListener('click', closeSidebar);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

  navPrev.addEventListener('click', () => { if (activeIdx !== null) openCard((activeIdx - 1 + N) % N); });
  navNext.addEventListener('click', () => { if (activeIdx !== null) openCard((activeIdx + 1) % N); });

  // Live sync sidebar -> card previews + auto-save
  sbHeadline.addEventListener('input', () => {
    if (activeIdx === null) return;
    data[activeIdx].headline = sbHeadline.value;
    refreshCard(activeIdx);
    scheduleAutoSave();
    scheduleFirebaseSync();
  });
  sbBody.addEventListener('input', () => {
    if (activeIdx === null) return;
    data[activeIdx].body = sbBody.value;
    refreshCard(activeIdx);
    scheduleAutoSave();
    scheduleFirebaseSync();
  });

  // Click card to open sidebar (ignore if clicking the clear button or checkbox)
  board.addEventListener('click', e => {
    if (e.target.closest('.card-clear')) return;
    if (e.target.closest('.card-checkbox')) return;
    const card = e.target.closest('.card');
    if (!card) return;
    const i = parseInt(card.dataset.idx);
    if (activeIdx === i) closeSidebar();
    else openCard(i);
  });

  // Clear individual card
  function clearSingleCard(i) {
    data[i].headline = '';
    data[i].body = '';
    refreshCard(i);
    if (activeIdx === i) {
      sbHeadline.value = '';
      sbBody.value = '';
    }
    scheduleAutoSave();
    scheduleFirebaseSync();
    showStatus(`CARD ${i + 1} CLEARED`);
  }

  // Card-level clear button (on the board)
  board.addEventListener('click', e => {
    const clearBtn = e.target.closest('.card-clear');
    if (!clearBtn) return;
    e.stopPropagation();
    const card = clearBtn.closest('.card');
    const i = parseInt(card.dataset.idx);
    clearSingleCard(i);
  });

  // Sidebar clear button
  sbClearCard.addEventListener('click', () => {
    if (activeIdx === null) return;
    clearSingleCard(activeIdx);
  });

  // ── Multi-select ──
  const selected = new Set();

  function updateSelectBar() {
    const count = selected.size;
    selectBar.classList.toggle('visible', count > 0);
    selectCount.textContent = `${count} selected`;
    board.classList.toggle('select-mode', count > 0);
  }

  function toggleSelect(i) {
    const card = getCard(i);
    if (selected.has(i)) {
      selected.delete(i);
      card.classList.remove('selected');
    } else {
      selected.add(i);
      card.classList.add('selected');
    }
    updateSelectBar();
  }

  function deselectAll() {
    selected.forEach(i => getCard(i).classList.remove('selected'));
    selected.clear();
    updateSelectBar();
  }

  // Checkbox click on board
  board.addEventListener('click', e => {
    const checkbox = e.target.closest('.card-checkbox');
    if (!checkbox) return;
    e.stopPropagation();
    const card = checkbox.closest('.card');
    const i = parseInt(card.dataset.idx);
    toggleSelect(i);
  });

  // Clear selected button
  btnClearSelected.addEventListener('click', () => {
    if (selected.size === 0) return;
    const count = selected.size;
    if (!confirm(`Clear ${count} selected card${count > 1 ? 's' : ''}?`)) return;
    selected.forEach(i => {
      data[i].headline = '';
      data[i].body = '';
      refreshCard(i);
      if (activeIdx === i) {
        sbHeadline.value = '';
        sbBody.value = '';
      }
    });
    deselectAll();
    scheduleAutoSave();
    scheduleFirebaseSync();
    showStatus(`${count} CARD${count > 1 ? 'S' : ''} CLEARED`);
  });

  // Deselect all button
  btnDeselectAll.addEventListener('click', deselectAll);

  // ── Save / Load ──

  function showStatus(msg, success = true) {
    saveStatus.textContent = msg;
    saveStatus.classList.toggle('saved', success);
    saveStatus.style.color = success ? '#6abf6a' : '#c06060';
    setTimeout(() => { saveStatus.textContent = ''; saveStatus.style.color = ''; }, 2200);
  }

  function serializeData() {
    flushSidebar();
    return JSON.stringify({ v: 1, cards: data }, null, 2);
  }

  function loadFromArray(arr) {
    for (let i = 0; i < N; i++) {
      data[i].headline = (arr[i] && arr[i].headline) || '';
      data[i].body     = (arr[i] && arr[i].body)     || '';
      refreshCard(i);
    }
    if (activeIdx !== null) {
      sbHeadline.value = data[activeIdx].headline;
      sbBody.value     = data[activeIdx].body;
    }
  }

  function scheduleAutoSave() {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      localStorage.setItem(STORAGE_KEY, serializeData());
    }, 800);
  }

  // Download JSON
  btnSave.addEventListener('click', () => {
    const json  = serializeData();
    localStorage.setItem(STORAGE_KEY, json);
    const blob  = new Blob([json], { type: 'application/json' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    const d     = new Date();
    const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    a.href     = url;
    a.download = `prep-board-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showStatus('FILE SAVED');
  });

  // Load JSON from disk
  btnLoad.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        const arr    = parsed.cards || parsed;
        if (!Array.isArray(arr)) throw new Error();
        loadFromArray(arr);
        localStorage.setItem(STORAGE_KEY, serializeData());
        showStatus('LOADED');
      } catch {
        showStatus('BAD FILE', false);
      }
    };
    reader.readAsText(file);
    fileInput.value = '';
  });

  // Clear all
  btnClear.addEventListener('click', () => {
    if (!confirm('Clear all 32 cards? This cannot be undone.')) return;
    closeSidebar();
    for (let i = 0; i < N; i++) { data[i].headline = ''; data[i].body = ''; refreshCard(i); }
    localStorage.removeItem(STORAGE_KEY);
    showStatus('CLEARED');
  });

  // Restore: try Firebase first, fall back to localStorage
  (function restore() {
    if (!db) {
      // Firebase unavailable — use localStorage only
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          const arr = parsed.cards || parsed;
          if (Array.isArray(arr)) loadFromArray(arr);
        } catch {}
      }
      showStatus('LOCAL ONLY', false);
      return;
    }
    db.ref(DB_PATH).once('value').then(snapshot => {
      const val = snapshot.val();
      if (Array.isArray(val) && val.some(c => c.headline || c.body)) {
        loadFromArray(val);
        showStatus('SYNCED');
      } else {
        // Firebase empty — try localStorage
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            const arr = parsed.cards || parsed;
            if (Array.isArray(arr)) {
              loadFromArray(arr);
              saveToFirebase(); // push local data up to Firebase
            }
          } catch {}
        }
      }
    }).catch(() => {
      // Firebase unreachable — fall back to localStorage
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          const arr = parsed.cards || parsed;
          if (Array.isArray(arr)) loadFromArray(arr);
        } catch {}
      }
      showStatus('OFFLINE', false);
    });
  })();

  // ── Drag & drop (swap data, not DOM) ──
  board.addEventListener('dragstart', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    dragSrc = card;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    requestAnimationFrame(() => card.classList.add('dragging'));
  });

  board.addEventListener('dragend', e => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragSrc = null;
  });

  board.addEventListener('dragover', e => {
    e.preventDefault();
    const target = e.target.closest('.card');
    if (!target || target === dragSrc) return;
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    target.classList.add('drag-over');
  });

  board.addEventListener('dragleave', e => {
    const target = e.target.closest('.card');
    if (target) target.classList.remove('drag-over');
  });

  board.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.card');
    if (!target || !dragSrc || target === dragSrc) return;
    target.classList.remove('drag-over');

    const si = parseInt(dragSrc.dataset.idx);
    const ti = parseInt(target.dataset.idx);

    flushSidebar();
    [data[si], data[ti]] = [data[ti], data[si]];
    refreshCard(si);
    refreshCard(ti);
    scheduleAutoSave();
    scheduleFirebaseSync();

    if (activeIdx === si) openCard(ti);
    else if (activeIdx === ti) openCard(si);
  });
</script>
</body>
</html>
